<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Daemon Tools</title>
    <link rel="stylesheet" href="assets/styles.css?v=20260518-overview">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <p class="eyebrow">Daemon Tools</p>
        <h1>Catalogo Daemon/Trevas</h1>
      </div>
      <div class="topbar-actions">
        <div class="metrics" id="metrics" aria-live="polite"></div>
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="Alternar tema escuro" title="Alternar tema">
          <span class="theme-toggle-icon" aria-hidden="true"></span>
          <span class="theme-toggle-text">Tema</span>
        </button>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar" aria-label="Areas">
        <div class="sidebar-header">
          <h2>Areas</h2>
          <button class="icon-button" id="refreshButton" type="button" title="Recarregar dados" aria-label="Recarregar dados">
            &#8635;
          </button>
        </div>
        <nav class="area-list" id="areaList"></nav>
      </aside>

      <section class="workspace" aria-live="polite">
        <div class="toolbar">
          <label class="search">
            <span>Buscar</span>
            <input id="searchInput" type="search" placeholder="Nome, fonte, resumo ou tag">
          </label>
        </div>

        <div class="browser">
          <section class="results-pane" aria-label="Lista de itens">
            <div class="results-head">
              <h2 id="resultsTitle">Itens</h2>
              <span id="resultsCount"></span>
            </div>
            <div class="results" id="results" role="listbox" aria-label="Itens encontrados"></div>
          </section>

          <article class="detail-pane" id="detailPane" aria-label="Detalhe do item">
            <div class="empty detail-empty">Selecione um item na lista.</div>
          </article>
        </div>
      </section>
    </main>

    <template id="areaButtonTemplate">
      <button class="area-button" type="button">
        <span class="area-name"></span>
        <span class="area-count"></span>
      </button>
    </template>

    <template id="itemTemplate">
      <button class="item-row" type="button" role="option">
        <span class="row-main">
          <span class="item-title"></span>
          <span class="item-preview"></span>
        </span>
        <span class="row-meta">
          <span class="pill item-kind"></span>
          <span class="muted item-source"></span>
        </span>
      </button>
    </template>

    <script src="assets/app.js?v=20260518-overview" type="module"></script>
  </body>
</html>
