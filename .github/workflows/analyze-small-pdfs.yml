name: Analyze small PDFs

on:
  workflow_dispatch:
    inputs:
      limit:
        description: Number of smallest PDFs to analyze
        required: false
        default: '25'
      max_pages:
        description: Number of pages to sample per PDF
        required: false
        default: '3'
      commit_results:
        description: Commit generated reports back to the workflow branch
        required: false
        default: 'true'

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository with LFS
        uses: actions/checkout@v4
        with:
          lfs: true
          persist-credentials: true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pymupdf

      - name: Analyze smallest PDFs
        run: |
          python scripts/analyze_small_pdfs.py --limit "${{ github.event.inputs.limit }}" --max-pages "${{ github.event.inputs.max_pages }}"

      - name: Upload analysis artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-content-analysis
          path: reports/pdf_content_analysis/

      - name: Commit analysis reports
        if: ${{ github.event.inputs.commit_results == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/pdf_content_analysis/
          if git diff --cached --quiet; then
            echo "No analysis changes to commit"
          else
            git commit -m "reports: add small PDF content analysis"
            git push
          fi
