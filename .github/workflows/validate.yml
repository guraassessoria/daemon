name: Validate data

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository with LFS
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -q

      - name: Validate generated data
        run: python scripts/validate_data.py

      - name: Check book coverage
        run: python scripts/check_book_coverage.py

      - name: Rebuild area catalog and GitHub Pages data
        run: |
          python scripts/build_area_catalog.py
          python scripts/build_github_pages_site.py

      - name: Check generated data drift
        run: git diff --exit-code -- data/areas data/index/area-summary.json docs/assets/data docs/reports/catalog/area-catalog-pass-001.md
